<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>印鑑作成・シャチハタ・ゴム印なら【Sirusi】</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background-color: #f9f7f2; overflow-x: hidden; }

        body { 
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif; 
            color: #2c2c2c;
            line-height: 1.6;
        }

        .lp-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        header { 
            background: #2c2c2c; 
            color: #fff; padding: 30px 15px; text-align: center;
        }

        header h1 { 
            /* 1行死守：最小値を0.9remまで下げて余裕を持たせる */
            font-size: clamp(0.9rem, 6vw, 1.6rem); 
            font-weight: bold;
            white-space: nowrap;
            letter-spacing: -0.02em;
        }

        .content { padding: 25px 20px; }

        .headline {
            background: #fff4f4; /* 視認性向上のため薄い赤に変更 */
            color: #e60012;
            font-weight: bold;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #e60012;
            margin-bottom: 25px;
            /* 1行死守 */
            font-size: clamp(0.85rem, 5vw, 1.1rem);
            white-space: nowrap;
        }

        .feature-card { 
            border-bottom: 1px solid #eee;
            padding-bottom: 15px; margin-bottom: 15px; 
        }

        .feature-card b { color: #b38b4d; display: block; margin-bottom: 5px; font-size: 1.05rem; }
        .feature-card p { font-size: 0.9rem; color: #666; }

        .cta-section { 
            background: #fdfdfd; 
            text-align: center; 
            padding: 30px 10px;
            border-top: 1px solid #eee;
        }

        .cta-label { 
            font-weight: bold; color: #2c2c2c; 
            margin-bottom: 15px; display: inline-block; 
            /* 1行死守 */
            font-size: clamp(0.9rem, 5.5vw, 1.2rem);
            white-space: nowrap;
        }

        .ad-container { 
            width: 100%; max-width: 300px; margin: 0 auto;
            line-height: 0; font-size: 0; position: relative;
        }

        .ad-container img { 
            width: 100% !important; height: auto !important; 
            display: block !important; border: none;
        }

        .tracking-pixel {
            position: absolute;
            width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }

        footer { 
            background: #2c2c2c; color: #fff; text-align: center; 
            padding: 20px 10px; 
            /* フッター見切れ防止：フォントサイズをさらに絞り、文字間隔を詰める */
            font-size: clamp(0.6rem, 3.2vw, 0.75rem);
            white-space: nowrap;
            letter-spacing: -0.03em;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="lp-container">
    <header>
        <h1>自分らしい印をデザインする。<br>印鑑作成の新しいカタチ。</h1>
    </header>

    <div class="content">
        <div class="headline">最短即日出荷・全国送料無料！</div>

        <div class="feature-card">
            <b>モダンなデザイン印影</b>
            <p>伝統を重んじながらも、現代的なタイポグラフィを取り入れた唯一無二の印影をご提案します。</p>
        </div>

        <div class="feature-card">
            <b>確かな品質と10年保証</b>
            <p>厳選された素材を使用。長く使うものだからこそ、10年保証で安心してご利用いただけます。</p>
        </div>
    </div>

    <div class="cta-section">
        <span class="cta-label">＼ こだわりの一本を、今すぐ作成 ／</span>
        <div class="ad-container">
            <a href="https://px.a8.net/svt/ejp?a8mat=4AV44C+4G5MIA+4SD0+601S1" rel="nofollow">
                <img border="0" width="300" height="250" alt="" src="https://www24.a8.net/svt/bgt?aid=260112540269&wid=001&eno=01&mid=s00000022338001008000&mc=1">
            </a>
            <img border="0" width="1" height="1" src="https://www18.a8.net/0.gif?a8mat=4AV44C+4G5MIA+4SD0+601S1" class="tracking-pixel" alt="">
        </div>
    </div>

    <footer>
        ※本ページはプロモーションを含みます。&nbsp;&copy; 2026 印鑑Sirusi 制作ガイド
    </footer>
</div>

</body>
</html>
