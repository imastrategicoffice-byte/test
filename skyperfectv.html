<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>【公式】スカパー！- 日本最大級の多チャンネル放送</title>
    <style>
        /* --- 徹底的な余白の排除とリセット --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background-color: #f0f2f5; overflow-x: hidden; }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
        }

        .lp-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- ヒーローエリア --- */
        header { 
            background: linear-gradient(135deg, #004098, #0073e6);
            color: #fff; padding: 35px 20px; text-align: center;
        }

        header h1 { 
            /* スマホ1行死守設定 */
            font-size: clamp(1.1rem, 6vw, 1.7rem); 
            line-height: 1.4; 
            font-weight: bold;
            white-space: nowrap;
        }

        /* --- コンテンツエリア --- */
        .content { padding: 25px 15px; }

        .headline {
            background: #fff4f4;
            color: #e60012;
            font-weight: bold;
            padding: 12px;
            text-align: center;
            border-bottom: 3px solid #e60012;
            margin-bottom: 25px;
            /* スマホ1行死守設定 */
            font-size: clamp(1rem, 5.5vw, 1.1rem);
            white-space: nowrap;
        }

        .card { 
            background: #fff; border: 1px solid #eef2f7; border-radius: 12px; 
            padding: 18px; margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-top: 4px solid #004098;
        }

        .card b { color: #004098; display: block; margin-bottom: 8px; font-size: 1.05rem; }
        .card p { font-size: 0.9rem; color: #555; line-height: 1.6; }

        .plan-list { margin-top: 10px; }
        .plan-item { 
            background: #f8fbff; border: 1px solid #d0e3f7; 
            padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem;
        }
        .plan-item strong { color: #e60012; }

        /* --- 広告エリア：余白ゼロ＆隔離戦略 --- */
        .cta-section { 
            background: #fffaf0; 
            text-align: center; 
            border-top: 2px solid #ff8c00;
            padding: 30px 0 0 0; 
        }

        .cta-label { 
            font-weight: bold; color: #d35400; 
            margin-bottom: 20px; display: inline-block; 
            /* スマホ1行死守設定 */
            font-size: clamp(0.95rem, 5.5vw, 1.2rem);
            white-space: nowrap;
            padding: 0 15px;
        }

        .ad-container { 
            width: 100%; margin: 0 auto;
            line-height: 0; font-size: 0; position: relative;
        }

        .ad-container a { display: block; line-height: 0; }

        /* メインバナーの隙間を消す設定 */
        .ad-container img { 
            width: 100% !important; height: auto !important; 
            display: block !important; border: none;
        }

        /* 1x1ピクセルをデザインから完全に隔離 */
        .tracking-pixel {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        footer { 
            background: #333; color: #fff; text-align: center; 
            padding: 20px 10px; font-size: 0.7rem; opacity: 0.9;
            /* フッター1行死守設定 */
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="lp-container">
    <header>
        <h1>家が映画館・スタジアムに！<br>スカパー！で感動体験を。</h1>
    </header>

    <div class="content">
        <div class="headline">ご加入月は視聴料0円！</div>

        <div class="card">
            <b>約70チャンネルの圧倒的充実</b>
