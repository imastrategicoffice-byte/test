<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>【公式】はんこdeハンコ - 高品質・最短即日出荷</title>
    <style>
        /* 全体最適化 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background-color: #f7f7f7; overflow-x: hidden; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; color: #333; line-height: 1.6; }
        .lp-container { max-width: 800px; margin: 0 auto; background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* ヘッダー：和風の赤を基調 */
        header { background: linear-gradient(135deg, #a40000, #d40000); color: #fff; padding: 40px 15px; text-align: center; }
        header h1 { font-size: clamp(1.1rem, 5vw, 1.8rem); font-weight: bold; line-height: 1.4; }
        
        /* スマホ1行死守：プロモーションバナー */
        .promo-banner { 
            background: #fff0f0; color: #a40000; text-align: center; padding: 12px 10px; font-weight: bold; border-bottom: 2px solid #a40000; 
            font-size: clamp(0.7rem, 3.8vw, 1.1rem); 
            white-space: nowrap;
        }
        
        /* コンテンツ */
        .content { padding: 30px 20px; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 20px; border-top: 5px solid #a40000; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card b { color: #a40000; display: block; margin-bottom: 10px; font-size: 1.1rem; }
        
        /* CTAセクション：スマホ1行死守 */
        .cta-section { background: #fdfdfd; text-align: center; border-top: 1px solid #eee; padding: 40px 15px; }
        .cta-label { 
            font-weight: bold; color: #d35400; margin-bottom: 20px; display: inline-block; 
            font-size: clamp(0.8rem, 4.5vw, 1.3rem); 
            white-space: nowrap;
        }
        
        /* 広告コンテナ */
        .ad-container { width: 100%; max-width: 300px; margin: 0 auto; line-height: 0; position: relative; }
        .ad-container a { display: block; }
        .ad-container img { width: 100% !important; height: auto !important; border: 1px solid #ddd; }
        
        /* 計測用ピクセルの完全隔離 */
        .tracking-pixel { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        
        /* フッター：注釈の改行防止 */
        footer { background: #333; color: #fff; text-align: center; padding: 30px 10px; font-size: 0.75rem; }
        .footer-note { 
            display: block; font-size: clamp(0.55rem, 3vw, 0.75rem); 
            white-space: nowrap; margin-bottom: 5px; 
        }
    </style>
</head>
<body>
<div class="lp-container">
    <header><h1>印鑑・はんこの作成なら<br>はんこdeハンコへ</h1></header>

    <div class="content">
        <div class="feature-grid">

            <div class="card"><b>圧倒的なスピード対応</b><p>急な必要時も安心。平日14時までの注文で即日出荷。全国へ迅速にお届けします。</p></div>
            <div class="card"><b>安心の10年保証</b><p>長くお使いいただくために。万が一の破損や摩耗にも対応する手厚い保証体制。</p></div>
        </div>
    </div>
    
    <div class="cta-section">
        <span class="cta-label">＼ Web限定価格でお得に作成 ／</span>
        <div class="ad-container">
            <a href="https://px.a8.net/svt/ejp?a8mat=453S74+BM8A02+4E9U+639IP" rel="nofollow">
            <img border="0" width="300" height="250" alt="" src="https://www22.a8.net/svt/bgt?aid=250424687595&wid=001&eno=01&mid=s00000020584001024000&mc=1"></a>
            <img border="0" width="1" height="1" src="https://www11.a8.net/0.gif?a8mat=453S74+BM8A02+4E9U+639IP" class="tracking-pixel" alt="">
        </div>
    </div>
    
    <footer>
        <span class="footer-note">※サービスの詳細・最新情報は公式サイトにてご確認ください。</span>
        <span class="footer-note">※本ページはプロモーションを含みます。</span>
        <p>&copy; 2026 IMA Strategic Office</p>
    </footer>
</div>
</body>
</html>
