<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN5一点突破｜戦略的最適化の連鎖</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%);
            --dark-bg: #0a0e14;
            --premium-white: #f8f9fa;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--dark-bg);
            color: var(--premium-white);
            line-height: 1.8;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: var(--dark-bg);
        }

        /* 三段構成の高級表題 */
        .main-title {
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            color: #d4af37;
            margin-bottom: 10px;
            display: block;
        }
        .huge-title {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 5px 15px rgba(212, 175, 55, 0.3);
        }
        .sub-title {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-top: 10px;
        }

        section {
            max-width: 900px;
            margin: 0 auto 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 4px;
        }

        .today-focus {
            border: 2px solid #d4af37;
            background: rgba(212, 175, 55, 0.05);
            text-align: center;
        }

        .gold-btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 2px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gold-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }

        .archive-list { list-style: none; padding: 0; }
        .archive-list li {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
        }
        .archive-list a { color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <span class="main-title">STRATEGIC OPTIMIZATION</span>
    <h1 class="huge-title">WIN5 一点突破<br>プロジェクト</h1>
    <p class="sub-title">戦略的最適化の連鎖は、盤面の掌握へと至る。</p>
</header>

<section id="today-section" class="today-focus">
    <h2 style="color:#d4af37;">THE LATEST PREDICTION</h2>
    <div id="today-content">
        <!-- JSで自動挿入 -->
    </div>
</section>

<section>
    <h2 style="font-size: 1.2rem; border-left: 3px solid #d4af37; padding-left: 15px;">PAST ARCHIVES</h2>
    <ul id="archive-list" class="archive-list">
        <!-- JSで過去ログが並ぶ -->
    </ul>
</section>

<script>
// 📝 ここにデータを追加するだけで自動仕分けされます
const raceData = [
    { date: "2026-05-10", url: "archive/2026/0510.html", title: "MAY 10th - 至高の1点" },
    { date: "2026-05-03", url: "archive/2026/0503.html", title: "MAY 3rd - 戦略的伏線" }
];

function updateDisplay() {
    const today = new Date().toISOString().split('T')[0];
    const todayContent = document.getElementById('today-content');
    const archiveList = document.getElementById('archive-list');
    let hasToday = false;

    raceData.forEach(item => {
        if (item.date === today) {
            todayContent.innerHTML = `<p style="font-size:1.4rem;">${item.title}</p><a href="${item.url}" class="gold-btn">EXPECTATION VIEW</a>`;
            hasToday = true;
        } else if (item.date < today) {
            const li = document.createElement('li');
            li.innerHTML = `<span>${item.date}</span><a href="${item.url}">${item.title} ❯</a>`;
            archiveList.appendChild(li);
        }
    });

    if (!hasToday) {
        todayContent.innerHTML = "<p>NEXT RACE COMING SOON...</p>";
    }
}
updateDisplay();
</script>

</body>
</html>
