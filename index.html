<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN5一点突破</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #b8860b 0%, #f7ef8a 50%, #b8860b 100%);
            --bg-color: #0d0d0d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: "Hiragino Mincho ProN", serif;
            text-align: center;
            overflow-x: hidden;
        }

        header {
            padding: 10vh 5% 5vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label {
            font-size: clamp(0.7rem, 2vw, 1rem);
            letter-spacing: 0.5em;
            color: #d4af37;
            margin-bottom: 1rem;
        }

        .main-title {
            font-size: clamp(2rem, 8vw, 4rem); 
            font-weight: 900;
            line-height: 1.2;
            margin: 0;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: keep-all;
        }

        .motto-container {
            margin-top: 2rem;
            width: 90%;
            max-width: 600px;
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            padding: 1rem 0;
        }

        .motto-text {
            font-size: clamp(1rem, 4vw, 1.5rem);
            letter-spacing: 0.3em;
            margin: 0;
            white-space: nowrap;
        }

        /* ★広告エリアの修正：はみ出し防止と中央寄せ★ */
        .ad-container {
            margin: 20px auto;
            padding: 0 10px;
            display: flex;
            justify-content: center; /* 中央寄せ */
            align-items: center;
            overflow: hidden; /* はみ出しをカット */
            max-width: 100%; /* 画面幅を超えない */
        }

        /* 広告の中身（iframe等）を強制的に画面内に収める */
        .ad-container * {
            max-width: 100% !important;
            height: auto !important;
        }

        section {
            width: 90%;
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem 5%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-sizing: border-box;
        }

        h2 {
            font-size: 1.2rem;
            color: #d4af37;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
        }

        .gold-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 1rem 3rem;
            background: var(--gold);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .archive-list {
            list-style: none;
            padding: 0;
            text-align: left;
        }

        .archive-list li {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .archive-list a {
            color: #d4af37;
            text-decoration: none;
        }

        @media (min-width: 768px) {
            header { padding: 15vh 5% 10vh; }
            section { margin-bottom: 4rem; }
        }
    </style>
</head>
<body>

<header>
    <span class="label">PREMIUM STRATEGY</span>
    <h1 class="main-title">WIN5 一点突破</h1>
    <div class="motto-container">
        <p class="motto-text">究極の一点突破を目指す</p>
    </div>
</header>

<!-- 広告エリア -->
<div class="ad-container">
    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/5dc767c9d027b146f3fc3e5d1036a45d"></script>
    <!-- admax -->
</div>

<section>
    <h2>最新予想</h2>
    <div id="today-content">
        <!-- JSで自動挿入 -->
    </div>
</section>

<section>
    <h2 style="text-align: left;">過去ログ</h2>
    <ul id="archive-list" class="archive-list">
        <!-- JSで自動挿入 -->
    </ul>
</section>

<script>
// ==========================================
// 【更新箇所】新しい予想を追加する時はここ！
// ==========================================
const raceData = [
    { date: "2026-05-09", url: "archive/2026/20260509.html", title: "2026年5月9日（土）" },
    { date: "2026-05-10", url: "archive/2026/0510.html", title: "2026年5月10日" }
];
// ==========================================

function updateDisplay() {
    const today = new Date().toISOString().split('T')[0];
    const todayContent = document.getElementById('today-content');
    const archiveList = document.getElementById('archive-list');
    let hasToday = false;

    raceData.forEach(item => {
        if (item.date === today) {
            todayContent.innerHTML = `
                <p style="font-size:1.4rem;">${item.title}</p>
                <a href="${item.url}" class="gold-btn">予想を閲覧</a>
            `;
            hasToday = true;
        } else if (item.date < today) {
            const li = document.createElement('li');
            li.innerHTML = `<span>${item.date}</span><a href="${item.url}">閲覧 ❯</a>`;
            archiveList.appendChild(li);
        }
    });

    if (!hasToday) {
        todayContent.innerHTML = "<p style='color:#888;'>次回の更新をお待ちください</p>";
    }
}
updateDisplay();
</script>

</body>
</html>
