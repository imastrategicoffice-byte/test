<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN5一点突破</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #cfb53b 0%, #fff9aa 50%, #cfb53b 100%);
            --bg-color: #0d0d0d;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            line-height: 1.8;
            text-align: center;
        }

        header {
            padding: 80px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
        }

        .top-label {
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            color: #cfb53b;
            margin-bottom: 15px;
            display: block;
        }
        .main-title {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 0;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .motto {
            font-size: 1.2rem;
            margin-top: 25px;
            letter-spacing: 0.2em;
            border-top: 1px solid rgba(207, 181, 59, 0.4);
            display: inline-block;
            padding: 15px 40px 0;
        }

        section {
            max-width: 700px;
            margin: 0 auto 60px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(207, 181, 59, 0.2);
        }

        .gold-button {
            display: inline-block;
            margin-top: 25px;
            padding: 20px 60px;
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 0.1em;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        }

        .archive-list { list-style: none; padding: 0; margin-top: 30px; text-align: left; }
        .archive-list li {
            padding: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }
        .archive-list a { color: #cfb53b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <span class="top-label">PREMIUM STRATEGY</span>
    <h1 class="main-title">WIN5 一点突破</h1>
    <p class="motto">究極の一点突破を目指す</p>
</header>

<section>
    <h2 style="color:#cfb53b; font-size: 1.4rem; letter-spacing: 0.2em;">最新予想</h2>
    <div id="today-content">
        <!-- JSで自動挿入 -->
    </div>
</section>

<section>
    <h2 style="font-size: 1rem; border-left: 4px solid #cfb53b; padding-left: 15px; text-align: left;">過去ログ</h2>
    <ul id="archive-list" class="archive-list">
        <!-- JSで自動挿入 -->
    </ul>
</section>

<script>
/**
 * 📝 更新方法：
 * dateは必ず「YYYY-MM-DD」形式で。
 * titleは日付のみを入力してください。
 */
const raceData = [
    { date: "2026-05-10", url: "archive/2026/0510.html", title: "2026年5月10日" },
    { date: "2026-05-03", url: "archive/2026/0503.html", title: "2026年5月03日" }
];

function updateDisplay() {
    const today = new Date().toISOString().split('T')[0];
    const todayContent = document.getElementById('today-content');
    const archiveList = document.getElementById('archive-list');
    let hasToday = false;

    raceData.forEach(item => {
        if (item.date === today) {
            todayContent.innerHTML = `
                <p style="font-size:1.5rem; margin-bottom:15px;">${item.title}</p>
                <a href="${item.url}" class="gold-button">予想閲覧</a>
            `;
            hasToday = true;
        } else if (item.date < today) {
            const li = document.createElement('li');
            li.innerHTML = `<span>${item.date}</span><a href="${item.url}">閲覧 ❯</a>`;
            archiveList.appendChild(li);
        }
    });

    if (!hasToday) {
        todayContent.innerHTML = "<p style='color:#888;'>次回更新をお待ちください</p>";
    }
}
updateDisplay();
</script>

</body>
</html>
