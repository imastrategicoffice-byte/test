<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN5一点突破｜戦略的最適化</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f4f4; }
        section { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .today-box { border: 3px solid #e44d26; background: #fff5f2; }
        .archive-list { list-style: none; padding: 0; }
        .archive-list li { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .btn { display: inline-block; background: #e44d26; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header style="text-align:center;">
    <h1>WIN5一点突破プロジェクト</h1>
</header>

<!-- 【本日の予想エリア】 -->
<section id="today-section" class="today-box">
    <h2>本日の1点予想</h2>
    <div id="today-content">
        <!-- ここにJavaScriptで「今日のリンク」が自動表示されます -->
    </div>
</section>

<!-- 【過去ログエリア】 -->
<section>
    <h2>過去の的中実績・ログ</h2>
    <ul id="archive-list" class="archive-list">
        <!-- ここにJavaScriptで「過去になったリンク」が自動表示されます -->
    </ul>
</section>

<script>
/**
 * 📝 ここに「日付」と「その日の予想ページURL」を書き足すだけ！
 * 未来の日付は「本日の予想」に、過ぎた日付は「過去ログ」に自動で入ります。
 */
const raceData = [
    { date: "2026-05-10", url: "archive/2026/0510.html", title: "5月10日（日）の1点予想" },
    { date: "2026-05-03", url: "archive/2026/0503.html", title: "5月3日（日）の1点予想" },
    // 💡 次回分はここに一行追加するだけ！
];

function updateDisplay() {
    const today = new Date().toISOString().split('T')[0]; // 今日の日付を取得
    const todayContent = document.getElementById('today-content');
    const archiveList = document.getElementById('archive-list');

    let hasToday = false;

    raceData.forEach(item => {
        if (item.date === today) {
            // 今日の日付と一致する場合
            todayContent.innerHTML = `<p>${item.title}</p><a href="${item.url}" class="btn">今すぐ予想画面を見る</a>`;
            hasToday = true;
        } else if (item.date < today) {
            // 過去の日付の場合
            const li = document.createElement('li');
            li.innerHTML = `${item.date} ： <a href="${item.url}">${item.title}</a>`;
            archiveList.appendChild(li);
        }
    });

    if (!hasToday) {
        todayContent.innerHTML = "<p>本日のレース予定はありません。次回の更新をお楽しみに！</p>";
    }
}

updateDisplay();
</script>

</body>
</html>
