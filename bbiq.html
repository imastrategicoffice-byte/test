<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBIQ（ビビック）特設ページ</title>
    <style>
        /* --- 徹底的な余白の排除 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background-color: #f0f4f8; overflow-x: hidden; }

        body { 
            font-family: sans-serif; 
            background-image: repeating-linear-gradient(45deg, #e6edf5, #e6edf5 10px, #f0f4f8 10px, #f0f4f8 20px);
        }

        .lp-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        header { 
            background: linear-gradient(135deg, #0052cc, #003399);
            color: #fff; padding: 30px 15px; text-align: center;
        }

        header h1 { font-size: clamp(1.1rem, 6vw, 1.5rem); line-height: 1.4; }

        .content { padding: 20px 15px; }

        .card { 
            background: #fff; border: 1px solid #ddd; border-radius: 8px; 
            padding: 15px; margin-bottom: 15px; border-left: 5px solid #0052cc;
        }

        .card b { color: #0052cc; display: block; margin-bottom: 5px; font-size: 1rem; }
        .card p { font-size: 0.9rem; color: #555; }

        .price-box {
            display: flex; justify-content: space-between; gap: 10px;
        }

        .p-item { 
            flex: 1; background: #f8fbff; border: 1px solid #0052cc; 
            padding: 10px; border-radius: 5px; text-align: center; font-size: 0.75rem;
        }

        .p-item span { font-size: 1.1rem; color: #e60000; font-weight: bold; }

        /* --- 広告エリア：トラッキングコードの無効化 --- */
        .cta-section { 
            background: #fff8f0; 
            text-align: center; 
            border-top: 2px solid #ff8c00;
            padding-top: 20px;
            padding-bottom: 0;
        }

        .cta-label { font-weight: bold; color: #d35400; margin-bottom: 15px; display: block; font-size: 0.95rem; }

        .ad-container { 
            width: 100%; max-width: 300px; margin: 0 auto;
            line-height: 0; font-size: 0; position: relative;
        }

        .ad-container a { display: block; line-height: 0; margin: 0; padding: 0; }

        .ad-container img { 
            width: 100%; height: auto; display: block; border: none;
        }

        /* 1x1トラッキング画像をデザインから完全に隔離する設定 */
        .tracking-pixel {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        footer { 
            background: #eee; color: #777; text-align: center; 
            padding: 15px 10px; font-size: 0.7rem; line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="lp-container">
    <header>
        <h1>九州にお住まいならBBIQ！<br>最大30,000円還元実施中</h1>
    </header>

    <div class="content">
        <div class="card">
            <b>最大30,000円還元</b>
            <p>当サイト限定！高額キャッシュバックでおトクに開始。</p>
        </div>
        <div class="card">
            <b>au・九電セット割</b>
            <p>毎月の電気代やスマホ代も安くなる九州の定番ネット回線。</p>
        </div>
        <div class="price-box">
            <div class="p-item">マンション<br><span>3,300円〜</span></div>
            <div class="p-item">戸建住宅<br><span>4,070円〜</span></div>
        </div>
    </div>

    <div class="cta-section">
        <span class="cta-label">＼ キャンペーン詳細はこちら ／</span>
        <div class="ad-container">
            <a href="https://px.a8.net/svt/ejp?a8mat=45593Y+EJXH4I+42Y0+NWC81" rel="nofollow">
                <img src="https://www24.a8.net/svt/bgt?aid=250507870880&wid=001&eno=01&mid=s00000019044004014000&mc=1" alt="BBIQ広告">
            </a>
            <img src="https://www14.a8.net/0.gif?a8mat=45593Y+EJXH4I+42Y0+NWC81" class="tracking-pixel" alt="">
        </div>
    </div>

    <footer>
        ※本ページはプロモーションを含みます。<br>
        &copy; 2026 九州インターネット回線比較ガイド
    </footer>
</div>

</body>
</html>
