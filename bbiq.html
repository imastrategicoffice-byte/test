<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>【公式】BBIQ（ビビック）- 九州限定の超高速光回線</title>
    <style>
        /* --- 戦略的リセットとベース設定 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f0f4f8;
            color: #333;
            /* 背景にCSSだけでリッチなストライプを描画 */
            background-image: repeating-linear-gradient(45deg, #e6edf5, #e6edf5 10px, #f0f4f8 10px, #f0f4f8 20px);
        }

        .lp-wrapper { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* --- ヒーローエリア --- */
        .hero { 
            background: linear-gradient(135deg, #0052cc, #003399);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }

        /* clampで文字溢れを自動防止 */
        .hero h1 { 
            font-size: clamp(1.2rem, 6.5vw, 1.7rem);
            line-height: 1.4;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .hero p { 
            font-size: 0.95rem; 
            opacity: 0.9; 
            line-height: 1.5;
        }

        /* --- メインコンテンツ --- */
        .main-content { padding: 30px 15px; }

        .headline {
            background: #e6f0ff;
            color: #0052cc;
            font-size: 1.15rem;
            font-weight: bold;
            padding: 12px;
            text-align: center;
            border-left: 6px solid #0052cc;
            margin-bottom: 25px;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e6ed;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .card h2 {
            font-size: 1.1rem;
            color: #0052cc;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .card h2::before { 
            content: "✔"; 
            margin-right: 10px; 
            color: #ff8c00;
            font-weight: bold; 
        }

        .price-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .price-tag {
            background: #f8fbff;
            border: 2px solid #e6f0ff;
            padding: 15px 10px;
            border-radius: 10px;
            text-align: center;
        }

        .price-tag span { font-size: 0.75rem; color: #666; display: block; }
        .price-tag b { font-size: 1.2rem; color: #e60000; }

        /* --- CTAエリア：余白を徹底的に排除 --- */
        .cta-box {
            background: #fff9f2;
            padding: 40px 0 20px 0; /* 上にゆとりを持たせつつ左右下は画像に集中 */
            text-align: center;
            border-top: 3px solid #ff8c00;
        }

        .cta-label {
            color: #e67e22;
            font-weight: bold;
            font-size: clamp(1rem, 5.5vw, 1.3rem);
            margin-bottom: 20px;
            padding: 0 15px;
            display: inline-block;
        }

        /* バナー周りの謎の空白を物理的に消す設定 */
        .ad-wrap {
            margin: 0 auto;
            max-width: 300px;
            line-height: 0;
            font-size: 0;
        }

        .ad-wrap a {
            display: block;
            line-height: 0;
        }

        .ad-wrap img {
            width: 100% !important;
            height: auto !important;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
        }

        .footer-note {
            background: #f2f2f2;
            color: #888;
            text-align: center;
            padding: 25px 10px;
            font-size: 0.7rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="lp-wrapper">
    <header class="hero">
        <h1>九州限定！BBIQ光回線で<br>最大30,000円還元実施中</h1>
        <p>九州電力ユーザーなら、毎月のネット代が<br>さらにおトクに！auスマホ割も対応</p>
    </header>

    <div class="main-content">
        <div class="headline">BBIQが選ばれる3つのポイント</div>
        
        <div class="card">
            <h2>超高額キャッシュバック</h2>
            <p>当サイト限定の特典！最大30,000円の還元でおトクに高速インターネットを開始できます。</p>
        </div>

        <div class="card">
            <h2>九電・auスマホセット割</h2>
            <p>九州のインフラだからこその強み。電気代やスマホ代とまとめて固定費を削減しましょう。</p>
        </div>

        <div class="price-container">
            <div class="price-tag"><span>マンション</span><b>3,300円〜</b></div>
            <div class="price-tag"><span>戸建住宅</span><b>4,070円〜</b></div>
        </div>
