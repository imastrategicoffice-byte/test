<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lyprimo（リプリモ） - 即日利用可能なプリペイド携帯</title>
    <style>
        /* --- 1. 横揺れ・見切れの根絶スペック --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* html背景色をヘッダー主色と同期し、上部の白飛びを封鎖 */
        html { background-color: #d11212; overflow-x: hidden; }
        
        body { 
            width: 100%; 
            background-color: #f8f9fa; 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            color: #333; 
            line-height: 1.4; 
            overflow-x: hidden; /* 1pxの横揺れも許さない */
        }

        .lp-container { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            min-height: auto; /* PC表示の最適化：コンテンツに応じた高さ */
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- 2. ヘッダー：スマホの見切れを物理回避 --- */
        header { 
            background: linear-gradient(135deg, #d11212, #f03e3e); 
            color: #fff; 
            /* 文字を確実に安全圏へ押し下げる厚いパディング */
            padding: calc(100px + env(safe-area-inset-top)) 15px 45px; 
            text-align: center; 
            width: 100%;
        }

        header h1 { 
            /* 1行死守：画面枠を絶対に破壊させないclamp設定 */
            font-size: clamp(0.5rem, 5vw, 1.3rem); 
            font-weight: bold; 
            white-space: nowrap; 
            line-height: 1.2;
            display: block;
        }

        /* --- 3. コンテンツ：PCでのスカスカ感を解消 --- */
        .content { 
            padding: 25px 20px 10px; 
        }

        .headline { 
            background: #fff0f0; color: #d11212; font-weight: bold; 
            padding: 12px; text-align: center; border-bottom: 3px solid #d11212; 
            margin-bottom: 25px;
            font-size: clamp(0.5rem, 5vw, 1.1rem); white-space: nowrap; 
        }

        .card { 
            background: #fafafa; border: 1px solid #eee; border-radius: 8px; 
            padding: 18px; margin-bottom: 18px; 
            border-left: 5px solid #d11212; 
        }
        .card b { color: #d11212; display: block; margin-bottom: 6px; font-size: 1rem; }
        .card p { font-size: 0.85rem; color: #555; }

        /* --- 4. CTA：バナー位置の適正化 --- */
        .cta-section { 
            background: #fff; 
            text-align: center; 
            padding: 30px 10px 40px; 
            border-top: 1px solid #eee; 
            margin-top: 0; /* 不要な下部空白を排除 */
        }

        .cta-label { 
            font-weight: bold; color: #333; margin-bottom: 20px; display: inline-block; 
            font-size: clamp(0.5rem, 5vw, 1.05rem); white-space: nowrap; 
        }

        .ad-container { 
            width: 100%; max-width: 300px; margin: 0 auto; line-height: 0; font-size: 0; 
        }
        .ad-container img { 
            width: 100% !important; height: auto !important; 
            display: block !important; border: none; 
        }

        /* --- 5. フッター --- */
        footer { 
            background: #333; color: #fff; 
            padding: 20px 20px calc(25px + env(safe-area-inset-bottom)); 
            font-size: 0.7rem; line-height: 1.6; 
        }
        .footer-line1 { text-align: left; display: block; }
        .footer-line2 { text-align: right; display: block; opacity: 0.7; }
    </style>
</head>
<body>
<div class="lp-container">
    <header>
        <h1>Lyprimo（リプリモ） - 即日利用可能なプリペイド携帯</h1>
    </header>
    <div class="content">
        <div class="headline">銀行口座・クレジットカード不要で契約可能</div>
        <div class="card">
            <b>審査不要・身分証のみで契約</b>
            <p>お手元に届いたら即日利用可能。契約手続きや銀行口座、クレジットカードは一切不要です。</p>
        </div>
        <div class="card">
            <b>国内通話かけ放題付き</b>
            <p>通話料を気にせず利用可能。コンビニ決済対応で、使いたい期間ずーっと延長利用が可能です。</p>
        </div>
    </div>
    <div class="cta-section">
        <span class="cta-label">＼ 公式サイトでお申し込みはこちら ／</span>
        <div class="ad-container">
            <a href="https://px.a8.net/svt/ejp?a8mat=4AVBW3+5WJRQQ+529Y+5ZMCH" rel="nofollow">
            <img border="0" width="300" height="250" alt="" src="https://www23.a8.net/svt/bgt?aid=260122611357&wid=001&eno=01&mid=s00000023623001006000&mc=1"></a>
            <img border="0" width="1" height="1" src="https://www14.a8.net/0.gif?a8mat=4AVBW3+5WJRQQ+529Y+5ZMCH" alt="">
        </div>
    </div>
    <footer>
        <span class="footer-line1">※本ページはプロモーションを含みます。</span>
        <span class="footer-line2">&copy; 2026 Lyprimo 契約ガイド</span>
    </footer>
</div>
</body>
</html>
