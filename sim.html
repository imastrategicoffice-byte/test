<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        /* --- リセットと基本設定 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; background-color: #f4f7f9; overflow-x: hidden; }

        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            color: #333; line-height: 1.6;
        }

        .lp-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- ヒーローエリア --- */
        header { 
            background: linear-gradient(135deg, #005bac, #0076e4);
            color: #fff; padding: 30px 15px; text-align: center;
        }

        header h1 { 
            /* スマホ1行死守 */
            font-size: clamp(1rem, 6.2vw, 1.6rem); 
            font-weight: bold;
            white-space: nowrap;
        }

        /* --- コンテンツエリア --- */
        .content { padding: 25px 20px; }

        .headline {
            background: #fff4f4;
            color: #e60012;
            font-weight: bold;
            padding: 12px;
            text-align: center;
            border-bottom: 3px solid #e60012;
            margin-bottom: 25px;
            /* スマホ1行死守 */
            font-size: clamp(0.9rem, 5.5vw, 1.15rem);
            white-space: nowrap;
        }

        .check-list { margin-bottom: 25px; }
        .check-item { 
            position: relative; padding-left: 30px; margin-bottom: 12px; 
            font-size: 0.95rem; font-weight: bold; color: #005bac;
        }
        .check-item::before {
            content: '✔'; position: absolute; left: 0; color: #e60012; font-size: 1.2rem;
        }

        .card { 
            background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; 
            padding: 18px; margin-bottom: 20px; 
            border-left: 5px solid #005bac;
        }

        .card b { color: #005bac; display: block; margin-bottom: 8px; font-size: 1.05rem; }
        .card p { font-size: 0.85rem; color: #555; }

        /* --- 広告エリア：物理固定 --- */
        .cta-section { 
            background: #fdfdfd; 
            text-align: center; 
            padding: 30px 10px;
            border-top: 1px solid #eee;
        }

        .cta-label { 
            font-weight: bold; color: #333; 
            margin-bottom: 15px; display: inline-block; 
            /* スマホ1行死守 */
            font-size: clamp(0.95rem, 5.5vw, 1.2rem);
            white-space: nowrap;
        }

        .ad-container { 
            width: 100%; max-width: 300px; margin: 0 auto;
            line-height: 0; font-size: 0; position: relative;
        }

        .ad-container a { display: block; line-height: 0; }

        .ad-container img { 
            width: 100% !important; height: auto !important; 
            display: block !important; border: none;
        }

        .tracking-pixel {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }

        /* --- フッター：2段構成（見切れ封鎖） --- */
        footer { 
            background: #333; color: #fff; 
            padding: 15px 20px; 
            font-size: 0.75rem;
            line-height: 1.8;
        }

        .footer-line1 { text-align: left; display: block; }
        .footer-line2 { text-align: right; display: block; opacity: 0.8; }
    </style>
</head>

</div>

</body>
</html>
