<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>だれでもモバイル - 審査不要の音声SIM</title>
    <style>
        /* --- 収容・空白の完全最適化スペック --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { background-color: #005bac; }
        
        body { 
            width: 100%; 
            background-color: #f4f7f9; 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; 
            color: #333; 
            line-height: 1.5;
        }

        .lp-container { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* ヘッダー：文字の見切れを物理的に回避 */
        header { 
            background: linear-gradient(135deg, #005bac, #0076e4); 
            color: #fff; 
            /* 上部に十分な余白を確保し、システムバーとの衝突を避ける */
            padding: calc(60px + env(safe-area-inset-top)) 15px 40px; 
            text-align: center; 
        }

        header h1 { 
            /* 1行死守：画面幅に応じて極小まで縮小設定 */
            font-size: clamp(0.5rem, 5.8vw, 1.4rem); 
            font-weight: bold; 
            white-space: nowrap; 
            line-height: 1.2;
        }

        /* コンテンツ：PCでの間延びを解消 */
        .content { 
            padding: 30px 20px; 
            flex-grow: 1; /* ここで余白を調整 */
        }

        .headline { 
            background: #fff4f4; color: #e60012; font-weight: bold; 
            padding: 12px; text-align: center; border-bottom: 3px solid #e60012; 
            margin-bottom: 30px;
            font-size: clamp(0.5rem, 5vw, 1.15rem); white-space: nowrap; 
        }

        .card { 
            background: #f9f9f9; border: 1px solid #eee; border-radius: 10px; 
            padding: 20px; margin-bottom: 20px;
            border-left: 5px solid #005bac; 
        }
        .card b { color: #005bac; display: block; margin-bottom: 8px; font-size: 1rem; }
        .card p { font-size: 0.9rem; color: #555; }

        /* CTA：PC・スマホ両方で自然な位置に配置 */
        .cta-section { 
            background: #fdfdfd; 
            text-align: center; 
            padding: 40px 10px; 
            border-top: 1px solid #eee; 
            /* margin-top: auto を削除し、間延びを防止 */
        }

        .cta-label { 
            font-weight: bold; color: #333; margin-bottom: 20px; display: inline-block; 
            font-size: clamp(0.5rem, 5.5vw, 1.15rem); white-space: nowrap; 
        }

        .ad-container { 
            width: 100%; max-width: 300px; margin: 0 auto; line-height: 0; font-size: 0; 
        }
        .ad-container img { 
            width: 100% !important; height: auto !important; 
            display: block !important; border: none; 
        }

        /* フッター */
        footer { 
            background: #333; color: #fff; 
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom)); 
            font-size: 0.75rem; line-height: 1.8; 
        }
        .footer-line1 { text-align: left; display: block; }
        .footer-line2 { text-align: right; display: block; opacity: 0.8; }
    </style>
</head>
<body>
<div class="lp-container">
    <header>
        <h1>審査不要！本人名義でスマホが持てる</h1>
    </header>
    <div class="content">
        <div class="headline">身分証と銀行口座があれば契約可能</div>
        <div class="card">
            <b>だれでもモバイルとは？</b>
            <p>審査不要の音声SIMだから、大手キャリアで契約できなかった方でも本人名義でスマホが持てます。</p>
        </div>
        <div class="card">
            <b>レンタルスマホより低料金</b>
            <p>全プランかけ放題付き。安心のNTTドコモネットワークを利用した高品質なサービスです。</p>
        </div>
    </div>
    <div class="cta-section">
        <span class="cta-label">＼ 公式サイトでお申し込みはこちら ／</span>
        <div class="ad-container">
            <a href="https://px.a8.net/svt/ejp?a8mat=4AVBW3+5X584A+4G6O+1TK94X" rel="nofollow">
            <img border="0" width="300" height="250" alt="" src="https://www28.a8.net/svt/bgt?aid=260122611358&wid=002&eno=01&mid=s00000020760011012000&mc=1"></a>
            <img border="0" width="1" height="1" src="https://www11.a8.net/0.gif?a8mat=4AVBW3+5X584A+4G6O+1TK94X" alt="">
        </div>
    </div>
    <footer>
        <span class="footer-line1">※本ページはプロモーションを含みます。</span>
        <span class="footer-line2">&copy; 2026 だれでもモバイル 契約ガイド</span>
    </footer>
</div>
</body>
</html>
